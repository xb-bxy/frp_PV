<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050505;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #ededed;
        }
        .login-container {
            width: 300px;
            padding: 40px;
        }
        .login-container h2 {
            margin: 0 0 40px 0; font-size: 20px; font-weight: 400; text-align: center; color: #fff; letter-spacing: 1px;
        }
        .input-group { margin-bottom: 30px; position: relative; }
        .input-group input {
            width: 100%; padding: 10px 0; font-size: 14px; color: #fff;
            border: none; border-bottom: 1px solid #333; outline: none; background: transparent; transition: border-color 0.3s;
        }
        .input-group input:focus { border-bottom: 1px solid #fff; }
        .input-group label {
            position: absolute; top: 10px; left: 0; font-size: 14px; color: #666;
            pointer-events: none; transition: .3s ease all;
        }
        .input-group input:focus ~ label, .input-group input:valid ~ label {
            top: -20px; font-size: 12px; color: #aaa;
        }
        .login-btn {
            background: #fff; color: #000; border: none; padding: 12px; font-size: 14px;
            border-radius: 4px; cursor: pointer; width: 100%; transition: opacity 0.2s;
            margin-top: 10px;
        }
        .login-btn:hover { opacity: 0.8; }
        .error-msg {
            color: #ef4444; font-size: 13px; text-align: center; margin-bottom: 20px; min-height: 18px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>FRP THREAT MAP</h2>
        <div class="error-msg">{% if error %}{{ error }}{% endif %}</div>
        <form method="POST" action="/login">
            <div class="input-group">
                <input type="text" name="username" id="username" required>
                <label for="username">用户名</label>
            </div>
            <div class="input-group">
                <!-- 无密码时可留空，所以不设required -->
                <input type="password" name="password" id="password">
                <label for="password">密码 (无密码直接留空)</label>
            </div>
            <button type="submit" class="login-btn">登录</button>
        </form>
    </div>
</body>
</html>
